[colors]
alert           = ${env:POLY_ALERT:#A54242}
background      = ${env:POLY_BG:#272728}
background-alt  = ${env:POLY_BG_ALT:#373B41}
disabled        = ${env:POLY_DISABLED:#707880}
foreground      = ${env:POLY_FG:#A6A0A0}
primary         = ${env:POLY_PRIMARY:#61AFEF}
separator       = ${env:POLY_SEPARATOR:#413E3E}

[settings]
pseudo-transparency = true
screenchange-reload = true

[bar/main]
background = ${colors.background}
border-color = #0F0F0F00
border-size = 2pt
cursor-click  = pointer
cursor-scroll = ns-resize
enable-ipc = true
font-0 = JetBrainsMono Nerd Font:size=10.5;3
foreground = ${colors.foreground}
height = 22pt
line-size   = 2pt
module-margin = 0.5
modules-left   = xworkspaces sep memory sep cpu sep temperature sep battery
modules-center = power
modules-right  = cava sep volume sep wlan sep bluetooth sep date
padding-left  = 2
padding-right = 2
radius = 10
width  = 100%

[module/xworkspaces]
type = internal/xworkspaces

label-active            = %index%
label-active-background = ${colors.background}
label-active-foreground = ${colors.primary}
label-active-padding    = 1
label-active-underline  = ${colors.primary}
label-empty             = %index%
label-empty-foreground  = ${colors.foreground}
label-empty-padding     = 1
label-occupied          = %index%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding  = 1
label-urgent            = %index%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.foreground}
label-urgent-padding    = 1

[module/memory]
type = custom/script
exec = ~/.config/polybar/scripts/memory.sh
interval = 2

[module/cpu]
type = custom/script
exec = ~/.config/polybar/scripts/cpu.sh
interval = 2

[module/temperature]
type = custom/script
exec = ~/.config/polybar/scripts/temperature.sh
interval = 2

[module/battery]
type = custom/script
exec = ~/.config/polybar/scripts/battery.sh
interval = 1

[module/volume]
type = custom/script
exec = ~/.config/polybar/scripts/volume.sh
interval = 1

click-left = pamixer -t
scroll-up = pamixer -i 5
scroll-down = pamixer -d 5
click-right = exec tilix -e wiremix

[module/cava]
type = custom/script
exec   = $HOME/.config/polybar/scripts/cava.sh
format = <label>
label  = %{F#A6A0A0}%output%%{F-}
tail   = true

[module/wlan]
type = custom/script
click-left  = ~/.config/polybar/scripts/toggle_wifi.sh
click-right = exec tilix -e impala
exec        = ~/.config/polybar/scripts/wifi.sh
format      = <label>
interval    = 2

[module/bluetooth]
type = custom/script
click-left  = ~/.config/polybar/scripts/toggle_bluetooth.sh
click-right = exec tilix -e bluetui
exec        = ~/.config/polybar/scripts/bluetooth.sh
format      = <label>
interval    = 2

[module/date]
type = internal/date
date         = %a, %d %b %Y, %H:%M
date-alt     = %a %Y-%m-%d %H:%M:%S
interval     = 1
label        = %date%
label-foreground = ${colors.foreground}
tooltip-format = %date-alt%

[module/power]
type = custom/text
content = "⏻"
content-padding = 2
click-left = ~/.config/polybar/scripts/power.sh

[module/sep]
type = custom/text
content            = "|"
content-foreground = ${colors.separator}
content-padding    = 1

[module/eth]
inherit         = network-base
interface-type  = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[network-base]
type               = internal/network
format-connected   = <label-connected>
format-disconnected = <label-disconnected>
interval           = 5
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected
