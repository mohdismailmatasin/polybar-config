[colors]
alert           = ${env:POLY_ALERT:#A54242}
background      = ${env:POLY_BG:#272728}
background-alt  = ${env:POLY_BG_ALT:#373B41}
disabled        = ${env:POLY_DISABLED:#707880}
foreground      = ${env:POLY_FG:#f9e2af}
primary         = ${env:POLY_PRIMARY:#cba6f7}
separator       = ${env:POLY_SEPARATOR:#413E3E}

[settings]
pseudo-transparency = true
screenchange-reload = true

[bar/main]
background = ${colors.background}
border-color = #0F0F0F00
border-size = 2pt
cursor-click  = pointer
cursor-scroll = ns-resize
enable-ipc = true
font-0 = JetBrainsMono Nerd Font:size=10.5;3
foreground = ${colors.foreground}
height = 22pt
line-size   = 2pt
module-margin = 0
modules-left   = xworkspaces sep disk sep memory sep cpu sep temperature sep gpu sep battery sep brightness sep volume
modules-center = cava
modules-right  = network_speed sep wlan sep bluetooth sep usb sep date-time sep power
padding-left  = 2
padding-right = 2
radius = 10
width  = 100%

[module/xworkspaces]
type = internal/xworkspaces

label-active            = %index%
label-active-background = ${colors.background}
label-active-foreground = #f9e2af
label-active-padding    = 0.5
label-active-underline  = #f9e2af
label-empty             = %index%
label-empty-foreground  = ${colors.foreground}
label-empty-padding     = 0.5
label-occupied          = %index%
label-occupied-foreground = #f9e2af
label-occupied-padding  = 0.5
label-urgent            = %index%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.foreground}
label-urgent-padding    = 0.5

[module/memory]
type = custom/script
exec = ~/.config/polybar/scripts/memory.sh
interval = 2

[module/cpu]
type = custom/script
exec = ~/.config/polybar/scripts/cpu.sh
interval = 2

[module/temperature]
type = custom/script
exec = ~/.config/polybar/scripts/temperature.sh
interval = 2

[module/battery]
type = custom/script
exec = ~/.config/polybar/scripts/battery.sh
interval = 1

[module/gpu]
type = custom/script
exec = ~/.config/polybar/scripts/gpu.sh
interval = 2

[module/brightness]
type = custom/script
exec = /bin/bash ~/.config/polybar/scripts/brightness.sh
interval = 1

click-left = brightnessctl set +5%
click-right = brightnessctl set 5%-
scroll-up = brightnessctl set +2%
scroll-down = brightnessctl set 2%-

[module/network_speed]
type = custom/script
exec = ~/.config/polybar/scripts/network_speed.sh
interval = 1

[module/disk]
type = custom/script
exec = ~/.config/polybar/scripts/disk.sh
interval = 30

[module/volume]
type = custom/script
exec = ~/.config/polybar/scripts/volume.sh
interval = 1

click-left = pamixer -t
scroll-up = pamixer -i 5
scroll-down = pamixer -d 5
click-right = exec tilix -e wiremix

[module/cava]
type = custom/script
exec   = $HOME/.config/polybar/scripts/cava.sh
format = <label>
label  = %{F#98C379}%output%%{F-}
tail   = true

[module/wlan]
type = custom/script
click-left  = ~/.config/polybar/scripts/toggle_wifi.sh
click-right = exec tilix -e impala
exec        = ~/.config/polybar/scripts/wifi.sh
format      = <label>
interval    = 2

[module/bluetooth]
type = custom/script
click-left  = ~/.config/polybar/scripts/toggle_bluetooth.sh
click-right = exec tilix -e bluetui
exec        = ~/.config/polybar/scripts/bluetooth.sh
format      = <label>
interval    = 2

[module/date-time]
type = custom/script
exec = ~/.config/polybar/scripts/date-time.sh
interval = 1
tail = true

label = %output%
label-foreground = ${colors.foreground}

click-left = ~/.config/polybar/scripts/date-time.sh alt

[module/power]
type = custom/text
content = "⏻"
content-foreground = #ffffff
content-padding = 1
click-left = ~/.config/polybar/scripts/power.sh

[module/sep]
type = custom/text
content            = "|"
content-foreground = ${colors.separator}
content-padding    = 1

[module/eth]
inherit         = network-base
interface-type  = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[network-base]
type               = internal/network
format-connected   = <label-connected>
format-disconnected = <label-disconnected>
interval           = 5
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/usb]
type = custom/script
exec = ~/.config/polybar/scripts/usb.sh
interval = 5

click-left = ~/.config/polybar/scripts/usb.sh --mount
click-right = ~/.config/polybar/scripts/usb.sh --unmount
